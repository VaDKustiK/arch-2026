services:
  api-demo:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: default
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: keydb
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - keydb

  postgres:
    image: postgres:13.3
    environment:
      POSTGRES_DB: default
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "8001:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  keydb:
    image: eqalpha/keydb:x86_64_v5.3.3
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata: