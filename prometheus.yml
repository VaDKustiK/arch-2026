global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "fastapi"
    static_configs:
      - targets: ["api-demo:8080"]

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - "alert_rules.yml"